name: ci

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel an in-flight CI run when a newer commit lands on the same ref.
# Saves minutes on rapid iteration without losing signal for the latest commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Incremental compilation wastes cache space and rarely helps in CI.
  CARGO_INCREMENTAL: 0

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v6.0.2

      # rust-toolchain.toml pins the channel; rustup (preinstalled on
      # ubuntu-latest) auto-installs the listed components on first cargo call.
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: rust
          key: rust

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets

      - name: Test (release)
        # `cargo test --release` builds the binaries too — saves one cargo build call.
        run: cargo test --release

  python:
    name: python lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install dev deps (test + lint)
        run: uv sync --group test --group lint
      - name: Ruff lint (python + ipynb)
        run: uv run -- ruff check . ../analysis
      - name: Ruff format check (python + ipynb)
        run: uv run -- ruff format --check . ../analysis
      - name: Pytest
        run: uv run -- pytest -q

  notebook:
    name: notebook execute
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install analysis deps
        run: uv sync --group analysis
      - name: Execute notebook (smoke; no file output)
        run: |
          uv run -- jupyter execute \
              --timeout=120 \
              ../analysis/explore_results.ipynb
