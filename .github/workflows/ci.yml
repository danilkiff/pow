name: ci

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel an in-flight CI run when a newer commit lands on the same ref.
# Saves minutes on rapid iteration without losing signal for the latest commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Incremental compilation wastes cache space and rarely helps in CI.
  CARGO_INCREMENTAL: 0

jobs:
  rust:
    name: rust ${{ matrix.features }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - features: default
            cargo_flags: ""
            check_fmt: true
          - features: mb
            cargo_flags: "--features mb"
            check_fmt: false
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins the channel; rustup (preinstalled on
      # ubuntu-latest) auto-installs the listed components on first cargo call.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          # separate cache slot per feature set
          key: ${{ matrix.features }}

      - name: Restore ISA-L Crypto from cache
        if: matrix.features == 'mb'
        id: isal-cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/include/isa-l_crypto
            /usr/lib/libisal_crypto.a
            /usr/lib/libisal_crypto.la
            /usr/lib/libisal_crypto.so
            /usr/lib/libisal_crypto.so.2
            /usr/lib/libisal_crypto.so.2.0.26
          # bump suffix to invalidate when upstream version changes
          key: isal-crypto-v2.26-${{ runner.os }}

      - name: Build ISA-L Crypto from source
        if: matrix.features == 'mb' && steps.isal-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm autoconf automake libtool pkg-config
          git clone --depth 1 https://github.com/intel/isa-l_crypto.git /tmp/isa-l_crypto
          cd /tmp/isa-l_crypto
          ./autogen.sh
          ./configure --prefix=/usr
          make -j$(nproc)
          sudo make install

      - name: Refresh ld cache (for mb)
        if: matrix.features == 'mb'
        run: sudo ldconfig

      - name: Format check
        if: matrix.check_fmt
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets ${{ matrix.cargo_flags }}

      - name: Test (release)
        # `cargo test --release` builds the binaries too — saves one cargo build call.
        run: cargo test --release ${{ matrix.cargo_flags }}

  python:
    name: python lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dev deps (test + lint)
        run: uv sync --group test --group lint
      - name: Ruff lint (python + ipynb)
        run: uv run -- ruff check . ../analysis
      - name: Ruff format check (python + ipynb)
        run: uv run -- ruff format --check . ../analysis
      - name: Pytest
        run: uv run -- pytest -q --cov=. --cov-report=term-missing

  notebook:
    name: notebook execute
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Bootstrap analysis env + kernel
        working-directory: python
        run: ./setup-analysis-env.sh
      - name: Execute notebook with pinned kernel (no file output)
        working-directory: python
        run: |
          uv run -- jupyter execute \
              --timeout=120 \
              --kernel_name=pow-analysis \
              ../analysis/explore_results.ipynb
