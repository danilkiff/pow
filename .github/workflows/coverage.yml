name: coverage

# Coverage is expensive and rarely actionable on every push, so it runs
# manually or on a weekly schedule rather than per-commit.
on:
  workflow_dispatch:
  schedule:
    # Every Monday at 04:00 UTC
    - cron: "0 4 * * 1"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  rust-coverage:
    name: rust coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: rust
          key: coverage
      - uses: taiki-e/install-action@v2.73.0
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-lcov
          path: rust/lcov.info
          retention-days: 30
